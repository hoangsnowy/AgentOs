<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" font-family="'Segoe UI','Inter',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#121a25"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6cc6f0"/>
      <stop offset="1" stop-color="#3daee9"/>
    </linearGradient>
    <linearGradient id="bandHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3daee9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3daee9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3daee9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3daee9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#7fb8d8"/>
    </marker>
    <marker id="arrowLoop" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#f0b429"/>
    </marker>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg)"/>
  <rect width="1600" height="1180" fill="url(#grid)"/>
  <ellipse cx="800" cy="120" rx="700" ry="200" fill="url(#glow)"/>

  <!-- ===================== HEADER ===================== -->
  <g>
    <rect x="60" y="40" width="56" height="56" rx="14" fill="url(#accentGrad)"/>
    <text x="88" y="79" font-size="34" font-weight="700" fill="#06121b" text-anchor="middle">A</text>
    <text x="132" y="72" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="0.5">AgentOS</text>
    <text x="134" y="100" font-size="17" fill="#93a4b5">.NET-native multi-agent AI platform for the software development lifecycle</text>

    <g font-size="13" font-weight="600">
      <rect x="1140" y="48" width="120" height="30" rx="15" fill="#16202c" stroke="#2b3a4a"/>
      <text x="1200" y="68" fill="#9fd4ef" text-anchor="middle">.NET 10 · C# 14</text>
      <rect x="1272" y="48" width="150" height="30" rx="15" fill="#16202c" stroke="#2b3a4a"/>
      <text x="1347" y="68" fill="#9fd4ef" text-anchor="middle">Modular Monolith</text>
      <rect x="1434" y="48" width="106" height="30" rx="15" fill="#16202c" stroke="#2b3a4a"/>
      <text x="1487" y="68" fill="#9fd4ef" text-anchor="middle">Blazor + MAF</text>
    </g>
    <line x1="60" y1="124" x2="1540" y2="124" stroke="#26303d" stroke-width="1"/>
  </g>

  <!-- ===================== BAND 1: SURFACES ===================== -->
  <g>
    <rect x="60" y="150" width="1480" height="26" rx="6" fill="url(#bandHead)"/>
    <text x="74" y="169" font-size="14" font-weight="700" fill="#3daee9" letter-spacing="2">SURFACES / HOSTS</text>
  </g>

  <!-- surface cards -->
  <g filter="url(#shadow)">
    <rect x="60"   y="190" width="460" height="78" rx="14" fill="#19232f" stroke="#2c3a48"/>
    <rect x="570"  y="190" width="460" height="78" rx="14" fill="#19232f" stroke="#2c3a48"/>
    <rect x="1080" y="190" width="460" height="78" rx="14" fill="#19232f" stroke="#2c3a48"/>
  </g>
  <g text-anchor="middle">
    <text x="290"  y="222" font-size="19" font-weight="700" fill="#eaf2f8">Blazor Server — AgentOS Desktop</text>
    <text x="290"  y="248" font-size="13" fill="#8aa0b2">Window manager · app catalog · realtime pipeline studio</text>
    <text x="800"  y="222" font-size="19" font-weight="700" fill="#eaf2f8">Minimal API + Scalar + /mcp</text>
    <text x="800"  y="248" font-size="13" fill="#8aa0b2">REST · OpenAPI docs · serves AgentOS as MCP tools</text>
    <text x="1310" y="222" font-size="19" font-weight="700" fill="#eaf2f8">RemoteAgent CLI</text>
    <text x="1310" y="248" font-size="13" fill="#8aa0b2">paired dev-machine agent · zero server API tokens</text>
  </g>
  <g stroke="#7fb8d8" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.8">
    <path d="M290 268 L290 300"/>
    <path d="M800 268 L800 300"/>
    <path d="M1310 268 C1310 285 800 285 800 300"/>
  </g>

  <!-- ===================== BAND 2: ORCHESTRATION CORE ===================== -->
  <g>
    <rect x="60" y="306" width="1480" height="26" rx="6" fill="url(#bandHead)"/>
    <text x="74" y="325" font-size="14" font-weight="700" fill="#3daee9" letter-spacing="2">ORCHESTRATION CORE — Leader · Specialists · Quality Loop</text>
  </g>
  <rect x="60" y="346" width="1480" height="178" rx="16" fill="#0f1822" stroke="#243140"/>

  <!-- leader -->
  <g filter="url(#shadow)">
    <rect x="86" y="380" width="210" height="110" rx="14" fill="url(#accentGrad)"/>
  </g>
  <g text-anchor="middle">
    <text x="191" y="425" font-size="21" font-weight="800" fill="#06121b">Orchestrator</text>
    <text x="191" y="450" font-size="13" font-weight="600" fill="#0a2231">the Leader</text>
    <text x="191" y="472" font-size="12" fill="#0d2a3d">coordinates · persists run</text>
  </g>

  <!-- specialists -->
  <g>
    <rect x="336" y="392" width="252" height="86" rx="13" fill="#19232f" stroke="#3daee9" stroke-opacity="0.5"/>
    <rect x="616" y="392" width="252" height="86" rx="13" fill="#19232f" stroke="#3daee9" stroke-opacity="0.5"/>
    <rect x="896" y="392" width="252" height="86" rx="13" fill="#19232f" stroke="#3daee9" stroke-opacity="0.5"/>
    <rect x="1176" y="392" width="252" height="86" rx="13" fill="#19232f" stroke="#f0b429" stroke-opacity="0.7"/>
  </g>
  <g text-anchor="middle">
    <text x="462"  y="430" font-size="18" font-weight="700" fill="#eaf2f8">Requirement</text>
    <text x="462"  y="455" font-size="12" fill="#8aa0b2">user story → spec</text>
    <text x="742"  y="430" font-size="18" font-weight="700" fill="#eaf2f8">Coding</text>
    <text x="742"  y="455" font-size="12" fill="#8aa0b2">spec → code artifact</text>
    <text x="1022" y="430" font-size="18" font-weight="700" fill="#eaf2f8">Testing</text>
    <text x="1022" y="455" font-size="12" fill="#8aa0b2">code → tests</text>
    <text x="1302" y="430" font-size="18" font-weight="700" fill="#f6c850">QA</text>
    <text x="1302" y="455" font-size="12" fill="#cda94f">scores req↔code↔test</text>
  </g>

  <!-- forward arrows -->
  <g stroke="#7fb8d8" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M296 435 L334 435"/>
    <path d="M588 435 L614 435"/>
    <path d="M868 435 L894 435"/>
    <path d="M1148 435 L1174 435"/>
  </g>
  <!-- QA loop back to Coding -->
  <path d="M1302 392 C1302 352 742 352 742 392" stroke="#f0b429" stroke-width="2.5" fill="none" marker-end="url(#arrowLoop)" stroke-dasharray="2 0"/>
  <text x="1022" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#f0b429">loop until consistent, or NMax iterations</text>

  <text x="800" y="508" text-anchor="middle" font-size="13" fill="#7d92a4">Pluggable engine: <tspan fill="#cfe6f4" font-weight="600">Classic loop</tspan> (default) · <tspan fill="#cfe6f4" font-weight="600">Microsoft Agent Framework Workflows graph</tspan> (Pipeline:Engine=Workflow)</text>

  <line x1="800" y1="524" x2="800" y2="556" stroke="#7fb8d8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===================== BAND 3: LLM GATEWAY ===================== -->
  <g>
    <rect x="60" y="562" width="1480" height="26" rx="6" fill="url(#bandHead)"/>
    <text x="74" y="581" font-size="14" font-weight="700" fill="#3daee9" letter-spacing="2">LLM GATEWAY — provider-agnostic</text>
  </g>
  <rect x="60" y="602" width="1480" height="150" rx="16" fill="#0f1822" stroke="#243140"/>

  <g filter="url(#shadow)">
    <rect x="86" y="636" width="290" height="86" rx="13" fill="#16222e" stroke="#3daee9"/>
  </g>
  <g text-anchor="middle">
    <text x="231" y="672" font-size="18" font-weight="700" fill="#eaf2f8">ILlmClientFactory</text>
    <text x="231" y="696" font-size="12" fill="#8aa0b2">keyed ILlmClient · key pool</text>
    <text x="231" y="712" font-size="12" fill="#8aa0b2">429 failover · CostCalculator</text>
  </g>

  <!-- providers -->
  <g>
    <rect x="410"  y="636" width="255" height="86" rx="13" fill="#241a16" stroke="#d97757"/>
    <rect x="695"  y="636" width="255" height="86" rx="13" fill="#16202a" stroke="#2b88d8"/>
    <rect x="980"  y="636" width="255" height="86" rx="13" fill="#1d1830" stroke="#7c5cff"/>
    <rect x="1265" y="636" width="255" height="86" rx="13" fill="#13241a" stroke="#22a35a"/>
  </g>
  <g text-anchor="middle">
    <text x="537"  y="672" font-size="17" font-weight="700" fill="#f0c2ac">Claude</text>
    <text x="537"  y="697" font-size="12" fill="#bf9385">Anthropic.SDK</text>
    <text x="822"  y="672" font-size="17" font-weight="700" fill="#a9d2f2">Azure OpenAI</text>
    <text x="822"  y="697" font-size="12" fill="#7ba8cf">Azure.AI.OpenAI</text>
    <text x="1107" y="672" font-size="17" font-weight="700" fill="#c3b4ff">MAF</text>
    <text x="1107" y="697" font-size="12" fill="#9788c9">Microsoft Agent Framework</text>
    <text x="1392" y="672" font-size="17" font-weight="700" fill="#8be0ac">RemoteAgent</text>
    <text x="1392" y="697" font-size="12" fill="#6cb88a">SignalR → dev machine</text>
  </g>
  <g stroke="#5b7488" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M376 663 L408 663"/>
    <path d="M376 679 L693 690"/>
    <path d="M376 679 L978 692" opacity="0.8"/>
    <path d="M376 679 L1263 694" opacity="0.7"/>
  </g>

  <!-- ===================== BAND 4: GOVERNANCE ===================== -->
  <g>
    <rect x="60" y="790" width="1480" height="26" rx="6" fill="url(#bandHead)"/>
    <text x="74" y="809" font-size="14" font-weight="700" fill="#3daee9" letter-spacing="2">GOVERNANCE — every tool call passes the seam</text>
  </g>
  <rect x="60" y="830" width="1480" height="118" rx="16" fill="#0f1822" stroke="#243140"/>

  <g text-anchor="middle" font-weight="700" font-size="16">
    <rect x="90"  y="864" width="230" height="58" rx="11" fill="#19232f" stroke="#2c3a48"/>
    <text x="205" y="892" fill="#eaf2f8">IToolGateway</text>
    <text x="205" y="911" font-size="11" font-weight="500" fill="#8aa0b2">single server-side seam</text>

    <rect x="392" y="864" width="200" height="58" rx="11" fill="#19232f" stroke="#2c3a48"/>
    <text x="492" y="892" fill="#eaf2f8">IToolPolicy</text>
    <text x="492" y="911" font-size="11" font-weight="500" fill="#8aa0b2">per-tenant allowlist gate</text>

    <rect x="664" y="864" width="200" height="58" rx="11" fill="#19232f" stroke="#2c3a48"/>
    <text x="764" y="892" fill="#eaf2f8">ITool.Invoke</text>
    <text x="764" y="911" font-size="11" font-weight="500" fill="#8aa0b2">build · GitHub PR · MCP</text>

    <rect x="936" y="864" width="230" height="58" rx="11" fill="#1f1c11" stroke="#7a6320"/>
    <text x="1051" y="892" fill="#f6c850">IToolInvocationLog</text>
    <text x="1051" y="911" font-size="11" font-weight="500" fill="#cda94f">evidence — refusals + errors too</text>

    <rect x="1238" y="864" width="282" height="58" rx="11" fill="#19232f" stroke="#2c3a48"/>
    <text x="1379" y="888" fill="#eaf2f8">Tools · MCP client + server</text>
    <text x="1379" y="911" font-size="11" font-weight="500" fill="#8aa0b2">{server}.{tool} · /mcp endpoint</text>
  </g>
  <g stroke="#7fb8d8" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M320 893 L390 893"/>
    <path d="M592 893 L662 893"/>
    <path d="M864 893 L934 893"/>
    <path d="M1166 893 L1236 893"/>
  </g>

  <!-- ===================== BAND 5: MODULAR MONOLITH ===================== -->
  <g>
    <rect x="60" y="986" width="1480" height="26" rx="6" fill="url(#bandHead)"/>
    <text x="74" y="1005" font-size="14" font-weight="700" fill="#3daee9" letter-spacing="2">MODULAR MONOLITH — each module = IModule + EF DbContext + Postgres schema</text>
  </g>
  <g font-size="13" font-weight="600" text-anchor="middle" fill="#cfe0ec">
    <!-- 11 module chips across -->
    <g>
      <rect x="60"   y="1026" width="124" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="122"  y="1048">AppConfig</text>
      <rect x="194"  y="1026" width="100" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="244"  y="1048">Llm</text>
      <rect x="304"  y="1026" width="118" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="363"  y="1048">Pipeline</text>
      <rect x="432"  y="1026" width="118" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="491"  y="1048">Identity</text>
      <rect x="560"  y="1026" width="112" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="616"  y="1048">Tenants</text>
      <rect x="682"  y="1026" width="96"  height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="730"  y="1048">Tools</text>
      <rect x="788"  y="1026" width="130" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="853"  y="1048">Integration</text>
      <rect x="928"  y="1026" width="134" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="995"  y="1048">Workspaces</text>
      <rect x="1072" y="1026" width="116" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="1130" y="1048">Sessions</text>
      <rect x="1198" y="1026" width="84"  height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="1240" y="1048">Mcp</text>
      <rect x="1292" y="1026" width="138" height="34" rx="17" fill="#16222e" stroke="#33485a"/><text x="1361" y="1048">RemoteAgent</text>
    </g>
  </g>

  <!-- ===================== BAND 6: RUNTIME PLATFORM ===================== -->
  <g>
    <rect x="60" y="1078" width="1480" height="24" rx="6" fill="#101922"/>
    <text x="74" y="1095" font-size="13" font-weight="700" fill="#6f8597" letter-spacing="2">RUNTIME PLATFORM</text>
  </g>
  <g font-size="13" font-weight="600" text-anchor="middle">
    <rect x="500"  y="1114" width="170" height="34" rx="8" fill="#10202c" stroke="#2c4254"/><text x="585"  y="1136" fill="#9fd4ef">PostgreSQL</text>
    <rect x="686"  y="1114" width="220" height="34" rx="8" fill="#10202c" stroke="#2c4254"/><text x="796"  y="1136" fill="#9fd4ef">Keycloak — OIDC multi-tenant</text>
    <rect x="922"  y="1114" width="200" height="34" rx="8" fill="#10202c" stroke="#2c4254"/><text x="1022" y="1136" fill="#9fd4ef">.NET Aspire (local)</text>
    <rect x="1138" y="1114" width="240" height="34" rx="8" fill="#10202c" stroke="#2c4254"/><text x="1258" y="1136" fill="#9fd4ef">Azure Container Apps — azd up</text>
  </g>
</svg>

# Real-auth end-to-end against the FULL Aspire stack (Postgres + Keycloak + MailHog + Api + Web).
# This is the "never test by hand again" job: a fresh container set boots per run, so the realm —
# including the seeded operator/member users — imports automatically (no manual volume wipe), then
# Playwright drives the real Keycloak OIDC login and asserts member role isolation + invitation email
# delivery (via the MailHog API). Heavy + Docker-bound, so it runs nightly + on manual dispatch only,
# NOT on every push (the fast unit suite in ci.yml guards those).
name: E2E (real-auth, full stack)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'   # nightly 02:00 UTC
  # Also run on PRs that touch the auth / email / spine surface or this workflow, so regressions in
  # those flows (member login, role gating, invite email) are caught before merge — not just nightly.
  pull_request:
    branches: [ main ]
    paths:
      - 'src/AgentOs.Modules.Tenants/**'
      - 'src/AgentOs.Modules.Sessions/**'
      - 'src/AgentOs.Modules.Pipeline/Agents/**'
      - 'src/AgentOs.Web/Components/Pages/SpineApp.razor'
      - 'src/AgentOs.Web/Components/Pages/UsersApp.razor'
      - 'infra/keycloak/**'
      - 'infra/AgentOs.AppHost/**'
      - 'tests/AgentOs.E2E.Tests/**'
      - '.github/workflows/e2e-realauth.yml'

jobs:
  e2e-realauth:
    name: Real-auth E2E (Aspire stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Trust HTTPS dev cert (the Web serves :5180 over HTTPS)
        run: dotnet dev-certs https

      - name: Restore
        run: dotnet restore AgentOs.slnx

      - name: Build (Debug)
        run: dotnet build AgentOs.slnx --configuration Debug --no-restore

      - name: Install Playwright + browser OS deps
        run: pwsh tests/AgentOs.E2E.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start Aspire AppHost (Postgres + Keycloak + MailHog + Api + Web)
        run: |
          nohup dotnet run --project infra/AgentOs.AppHost --configuration Debug --no-build > apphost.log 2>&1 &
          echo "APPHOST_PID=$!" >> "$GITHUB_ENV"
        env:
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
          DOTNET_ENVIRONMENT: Development

      - name: Wait for Keycloak realm + Web to be ready
        run: |
          echo "Waiting for Keycloak realm import (fresh volume => operator+member seed)..."
          ok=0
          for i in $(seq 1 72); do
            if curl -sf http://localhost:8080/realms/agentic/.well-known/openid-configuration > /dev/null; then
              echo "Keycloak realm 'agentic' is ready"; ok=1; break
            fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then echo "Keycloak never became ready"; cat apphost.log; exit 1; fi

          echo "Waiting for the Web on :5180..."
          ok=0
          for i in $(seq 1 36); do
            if curl -skf https://localhost:5180/ > /dev/null; then
              echo "Web is ready"; ok=1; break
            fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then echo "Web never became ready"; cat apphost.log; exit 1; fi

      - name: Run real-auth E2E (member role isolation + invitation email)
        env:
          RUN_AGENTOS_E2E_REAL: "true"
          AGENTOS_REAL_URL: "https://localhost:5180"
          MAILHOG_URL: "http://localhost:8025"
        run: |
          dotnet test tests/AgentOs.E2E.Tests \
            --configuration Debug --no-build \
            --filter "FullyQualifiedName~RealAuth" \
            --logger "trx;LogFileName=realauth.trx" \
            --results-directory ./TestResults

      - name: AppHost logs (always)
        if: always()
        run: cat apphost.log || true

      - name: Stop AppHost
        if: always()
        run: kill "${APPHOST_PID}" 2>/dev/null || true

      - name: Upload results + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: realauth-e2e-results
          path: |
            ./TestResults
            apphost.log

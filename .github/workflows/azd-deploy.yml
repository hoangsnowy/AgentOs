name: Deploy (azd / Aspire)

# Provisions + deploys the whole Aspire app model (API + Web + managed Postgres + Container Apps
# Env + ACR) via azd. Replaces the old Docker-build + bicep workflow.
#
# One-time setup (easiest): run `azd pipeline config` locally — it wires OIDC + repo vars/secrets.
# Manual setup: repo secrets AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID (existing),
#               repo variables AZURE_ENV_NAME (e.g. agentos-dev) + AZURE_LOCATION (e.g. southeastasia).
# NOTE: the OIDC service principal needs Owner or "User Access Administrator" (azd creates role
#       assignments for the managed identity → ACR pull + Key Vault). Contributor alone is not enough.

on:
  # Manual deploy only. Auto-CD on main is intentionally OFF: the Azure AD app reg has no federated
  # credential for subject `repo:<owner>/<repo>:ref:refs/heads/main`, so an automatic run reds main with
  # AADSTS700213. Re-enable continuous delivery by restoring the `workflow_run` trigger ONCE the fed-cred
  # exists:
  #   az ad app federated-credential create --id <appId> --parameters '{"name":"agentos-main",
  #     "issuer":"https://token.actions.githubusercontent.com",
  #     "subject":"repo:hoangsnowy/AgentOs:ref:refs/heads/main","audiences":["api://AzureADTokenExchange"]}'
  #   (or run `azd pipeline config`), then add back under `on:`:
  #     workflow_run: { workflows: [ "CI" ], types: [ completed ], branches: [ main ] }
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Provision & Deploy
    runs-on: ubuntu-latest
    # Manual dispatch only (see the `on:` note). When continuous delivery is re-enabled, restore the gate:
    #   if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && vars.AZURE_DEPLOY_ENABLED == 'true') }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - uses: actions/checkout@v7

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: azd login (OIDC)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --tenant-id "$AZURE_TENANT_ID" \
            --federated-credential-provider "github"

      # `az` (not just `azd`) must be authed: the KC redirect patch below calls `az containerapp show`.
      - name: az login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Push secrets into the azd env so they reach the containers. Without this the KC admin password
      # and the agentic-web client secret stay at their (public) appsettings defaults → login fails.
      - name: Select azd env + inject deploy secrets
        run: |
          azd env select "$AZURE_ENV_NAME" 2>/dev/null || azd env new "$AZURE_ENV_NAME" --no-prompt
          azd env set KeycloakAdminPassword    "${{ secrets.KEYCLOAKADMINPASSWORD }}"
          azd env set KeycloakWebClientSecret  "${{ secrets.KEYCLOAKWEBCLIENTSECRET }}"
          # LLM keys are per-tenant (set in-app via Settings → API keys). Only set a shared platform
          # fallback for a dev/demo deploy — leave unset for a real BYO-key multi-tenant deploy.
          if [ -n "${{ secrets.LLM__CLAUDE__APIKEY }}" ]; then
            azd env set Llm__Claude__ApiKey    "${{ secrets.LLM__CLAUDE__APIKEY }}"
          fi

      - name: Provision + deploy
        run: azd up --no-prompt

      # The realm import hardcodes https://localhost:5180 + a public client secret. Patch both to the
      # real ACA Web FQDN / the injected secret, or every login fails (Invalid redirect_uri / mismatch).
      - name: Patch Keycloak redirect URIs + client secret
        run: |
          RG=$(azd env get-values | sed -n 's/^AZURE_RESOURCE_GROUP=//p' | tr -d '"')
          KC=$(az containerapp show -n keycloak -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          WEB=$(az containerapp show -n web     -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          export KEYCLOAK_BASE_URL="https://$KC"
          export WEB_BASE_URL="https://$WEB"
          export KEYCLOAKADMINPASSWORD="${{ secrets.KEYCLOAKADMINPASSWORD }}"
          export KEYCLOAKWEBCLIENTSECRET="${{ secrets.KEYCLOAKWEBCLIENTSECRET }}"
          bash infra/hooks/postprovision.sh

      - name: Smoke — API /health
        id: smoke
        run: |
          # azd populates outputs for service URLs; fall back to a sentinel if missing.
          API_URL=$(azd env get-values | grep '^SERVICES_API_URL=' | head -1 | sed 's/^SERVICES_API_URL=//; s/"//g')
          if [ -z "$API_URL" ]; then
            echo "::warning::SERVICES_API_URL not exported by azd. Skipping smoke."
            exit 0
          fi
          echo "Probing $API_URL/health"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' "$API_URL/health" || echo "000")
            if [ "$CODE" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            echo "attempt $i: $CODE — retrying in 15s"
            sleep 15
          done
          echo "::error::API /health did not return 200 after 5 attempts"
          exit 1

      # The old step here POSTed /auth/token — that endpoint does not exist (auth is Keycloak OIDC),
      # so it failed on every run. Authenticated-flow smoke needs a browser OIDC code flow; that is
      # the manual post-deploy check. Here we verify the three public surfaces answer.
      - name: Smoke — Web root + Keycloak OIDC discovery
        if: steps.smoke.outcome == 'success'
        run: |
          probe() {
            local name="$1" url="$2"
            if [ -z "$url" ]; then
              echo "::warning::$name URL not set — skipping."
              return 0
            fi
            CODE=$(curl -s -L -o /dev/null -w '%{http_code}' "$url")
            if [ "$CODE" != "200" ]; then
              echo "::error::$name returned $CODE ($url)"
              return 1
            fi
            echo "$name OK ($url)"
          }
          WEB_URL=$(azd env get-values | grep '^WEB_BASE_URL=' | head -1 | sed 's/^WEB_BASE_URL=//; s/"//g')
          KC_URL=$(azd env get-values | grep '^KEYCLOAK_BASE_URL=' | head -1 | sed 's/^KEYCLOAK_BASE_URL=//; s/"//g')
          probe "Web root" "$WEB_URL"
          probe "Keycloak OIDC discovery" "${KC_URL:+$KC_URL/realms/agentic/.well-known/openid-configuration}"

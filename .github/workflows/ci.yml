name: CI

on:
  push:
    branches: [ main, develop, 'refactor/**' ]
  pull_request:
    branches: [ main ]

# Least privilege: CI only reads the repo + uploads artifacts via the default token scope.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify SDK
        run: dotnet --info

      - name: Restore
        run: dotnet restore AgentOs.slnx

      - name: Build (Release)
        run: dotnet build AgentOs.slnx --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test AgentOs.slnx \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test_results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # ---- Coverage gate -------------------------------------------------------------------------
      # Coverage was collected but never enforced — a deleted test or a gutted assertion could
      # silently drop coverage on main. This fails the build below MIN_LINE_RATE. The floor sits a
      # few points under the current baseline (unit-only line rate ~29%; the Razor UI is exercised by
      # the dev-auth E2E below + the manual real-auth suite, so it isn't in this number). RATCHET it
      # upward as unit coverage grows — never downward to make a red build pass.
      - name: Coverage gate
        env:
          MIN_LINE_RATE: "25"
        run: |
          report=$(find ./TestResults -name 'coverage.cobertura.xml' | head -n1)
          if [ -z "$report" ]; then echo "No cobertura report found."; exit 1; fi
          python3 - "$report" "$MIN_LINE_RATE" <<'PY'
          import sys, xml.etree.ElementTree as ET
          report, floor = sys.argv[1], float(sys.argv[2])
          rate = float(ET.parse(report).getroot().get("line-rate", "0")) * 100
          print(f"Line coverage: {rate:.1f}%  (floor {floor:.0f}%)")
          if rate + 1e-9 < floor:
              print(f"::error::Line coverage {rate:.1f}% is below the {floor:.0f}% floor.")
              sys.exit(1)
          PY

      # ---- Lightweight UI E2E (dev-auth) ----------------------------------------------------------
      # Boots the Web standalone (Auth:DevAutoLogin, no Keycloak/Postgres/Docker) and drives it with
      # Playwright. Fast (~2 min) and reuses the Release build. This is the per-PR regression guard —
      # it opens every desktop app, so circuit-crash regressions (e.g. an eager-DI ctor throwing on
      # Spine open) fail the build here. The heavy real-auth full-stack suite is run locally against
      # the Aspire stack (tests/AgentOs.E2E.Tests, RUN_AGENTOS_E2E_REAL=true) — not a CI gate.
      - name: Install Playwright (chromium + OS deps)
        run: pwsh tests/AgentOs.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start standalone Web (dev-auth, no DB)
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          nohup dotnet run --project src/AgentOs.Web --configuration Release --no-build --urls http://localhost:5199 > web.log 2>&1 &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for the Web
        run: |
          ok=0
          for i in $(seq 1 40); do
            if curl -sf http://localhost:5199/ > /dev/null; then echo "Web ready"; ok=1; break; fi
            sleep 3
          done
          if [ "$ok" != "1" ]; then echo "Web never became ready"; cat web.log; exit 1; fi

      - name: Dev-auth UI E2E
        env:
          RUN_AGENTOS_E2E: "true"
          AGENTOS_URL: "http://localhost:5199"
        run: |
          dotnet test tests/AgentOs.E2E.Tests \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=ui_e2e_results.trx" \
            --results-directory ./TestResults

      - name: Stop the Web
        if: always()
        run: kill "${WEB_PID}" 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            ./TestResults
            web.log

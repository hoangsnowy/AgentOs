# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# azd config — deploys the Aspire app model (API + Web + managed Postgres) to Azure Container Apps.
# Provision + deploy:  azd up
# CI setup:            azd pipeline config   (wires OIDC + a GitHub Actions workflow)
name: agentos

services:
  app:
    language: dotnet
    project: ./infra/AgentOs.AppHost/AgentOs.AppHost.csproj
    host: containerapp

hooks:
  # postDEPLOY (not postprovision): the Keycloak container app must be running before we can patch
  # its realm. Derives the KC/Web URLs from the ACA env default-domain output — no manual step.
  postdeploy:
    posix:
      shell: sh
      run: ./infra/hooks/postdeploy.sh
      interactive: false
      continueOnError: true
    windows:
      shell: pwsh
      run: ./infra/hooks/postdeploy.ps1
      interactive: false
      continueOnError: true

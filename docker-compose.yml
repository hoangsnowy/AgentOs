# Local Postgres for the dev persistence layer.
# Run:  docker compose up -d
# Connection string (set in user-secrets for Api + Web):
#   dotnet user-secrets set "ConnectionStrings:DefaultConnection" \
#     "Host=localhost;Port=5432;Database=agentic_sdlc;Username=postgres;Password=postgres"
services:
  postgres:
    image: postgres:16
    container_name: agentic-sdlc-pg
    environment:
      POSTGRES_DB: agentic_sdlc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agentic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_sdlc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak — identity provider for multi-tenant auth (Epic D). Dev mode (embedded store) with the
  # `agentic` realm auto-imported from ./infra/keycloak. Admin console: http://localhost:8080 (admin/admin).
  # Production uses an external DB + `start` (not start-dev); see docs/SETUP.md.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: agentic-sdlc-kc
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
      - agentic_kcdata:/opt/keycloak/data

volumes:
  agentic_pgdata:
  agentic_kcdata:

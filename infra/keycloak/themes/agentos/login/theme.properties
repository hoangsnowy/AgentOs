# AgentOS login theme — inherits Keycloak's base login theme (FreeMarker templates, JS),
# overrides only the CSS so the login / register / reset-password / verify-email pages match
# the AgentOS GNOME/Adwaita look (accent #3584e4, Inter font, soft surfaces, 8px/12px radii).
#
# Files under resources/ are served at /resources/<theme-name>/login/<path> by Keycloak.

parent=keycloak
import=common/keycloak

styles=css/agentos.css

# Drop the PatternFly base styles entirely — we re-do the form chrome from scratch in
# agentos.css. Without this Keycloak ships ~200 KB of pf-* selectors that fight ours.
stylesCommon=

locales=en

# Default page title (rendered in <title> by template.ftl). Realm display name still wins if set.
kcLogoLink=/
